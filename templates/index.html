<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Menu Inicial</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
            background-color: #f4f4f4;
            text-align: center;
        }

        h1 {
            margin-bottom: 30px;
        }

        .botao {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            margin-top: 15px;
            cursor: pointer;
            color: white;
        }

        .botao.primario {
            background-color: #007bff;
        }

        .botao.secundario {
            background-color: #6c757d;
        }
    </style>
</head>
<body>

    <div>
        <img src="{{ url_for('static', filename='logo.png') }}"
             alt="Logo da empresa"
             style="max-width: 180px; height: auto; box-shadow: 0 0 8px rgba(0,0,0,0.1); border-radius: 10px; margin-bottom: 20px;">
    </div>

    <h1>Termos de Responsabilidade</h1>

    <button type="button" class="botao primario" onclick="window.location.href='{{ url_for('centro_custos') }}'">
        Termos por Unidade Organizacional
    </button>

    <button type="button" class="botao primario" onclick="window.location.href='{{ url_for('termos_individuais') }}'">
        Termos Individuais
    </button>

    <!-- 🔄 Novo botão para upload -->
    <button type="button" class="botao primario" onclick="window.location.href='{{ url_for('upload') }}'">
        Atualizar Base de Dados
    </button>

</body>
</html>
